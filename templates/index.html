<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mqlogs</title>
<style>
  :root {
    --bg:      #161616;
    --surface: #262626;
    --border:  #393939;
    --text:    #f4f4f4;
    --dim:     #8d8d8d;
    --accent:  #78a9ff;
    --green:   #42be65;
    --orange:  #ff832b;
    --red:     #fa4d56;
    --mono:    'IBM Plex Mono', 'Consolas', monospace;
    --sans:    'IBM Plex Sans', 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent); margin-right: 4px; flex-shrink: 0; }
  #version-badge { font-size: 10px; color: var(--dim); align-self: center; margin-right: 8px; flex-shrink: 0; }

  input, select, button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 3px;
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  button { cursor: pointer; }
  button:hover { background: var(--border); }

  /* Single search field, wider */
  #search-input { width: 280px; }
  #search-input.has-filter { border-color: var(--accent); background: #1a2133; }

  .presets { display: flex; gap: 4px; }
  .preset-btn { padding: 4px 8px; font-size: 12px; }
  .preset-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  #live-toggle { padding: 5px 12px; }
  #live-toggle.live-on  { background: var(--green); color: #000; border-color: var(--green); }
  #live-toggle.live-off { background: var(--surface); }

  #clear-btn { color: var(--dim); }

  #stats-bar {
    font-size: 11px;
    color: var(--dim);
    padding: 4px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }

  #log-container {
    height: calc(100vh - 80px);
    overflow-y: auto;
    padding: 8px 16px;
  }

  .log-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid #1e1e1e;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .log-ts      { color: var(--dim); white-space: nowrap; flex-shrink: 0; }
  .log-topic   { white-space: nowrap; flex-shrink: 0; font-weight: 500;
                 overflow: hidden; text-overflow: ellipsis; max-width: 50vw; }
  .log-payload { color: #c6c6c6; word-break: break-word; min-width: 0; }
  .log-badge   { font-size: 9px; background: var(--orange); color: #000;
                 padding: 1px 4px; border-radius: 2px; flex-shrink: 0; }

  @media (max-width: 640px) {
    .log-row     { flex-wrap: wrap; }
    .log-topic   { max-width: calc(100vw - 160px); }
    .log-payload { flex: 1; min-width: 0; word-break: break-word; }
    #log-container { padding: 6px 10px; }
    header { padding: 8px 10px; gap: 8px; }
    #search-input { width: 100%; }
  }

  #load-more {
    display: block;
    width: 100%;
    margin: 12px 0;
    padding: 8px;
    text-align: center;
    font-size: 13px;
  }

  .empty-state {
    color: var(--dim);
    text-align: center;
    padding: 60px 16px;
    font-size: 13px;
  }
  .empty-state h2 { font-size: 16px; margin-bottom: 8px; }

  .error-msg {
    background: #2d1515;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 8px 12px;
    border-radius: 3px;
    margin: 8px 0;
    font-size: 12px;
  }

  #live-indicator {
    display: none;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--green);
  }
  #live-indicator.visible { display: flex; }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
</style>
</head>
<body>

<header>
  <h1>mqlogs</h1>
  <span id="version-badge">{{ version }}</span>

  <!-- Single search field: filters topic AND payload -->
  <input id="search-input" type="text" placeholder="Filter topics &amp; messages…"
         value="{{ default_filter }}" autocomplete="off">

  <div class="presets">
    <button class="preset-btn" data-h="1">1h</button>
    <button class="preset-btn" data-h="24">24h</button>
    <button class="preset-btn" data-h="168">7d</button>
    <button class="preset-btn active" data-h="0">All</button>
  </div>

  <button id="live-toggle" class="live-on">Live ●</button>
  <div id="live-indicator"><span class="live-dot"></span> connected</div>
  <button id="clear-btn">Clear</button>
</header>

<div id="stats-bar">
  <span id="stat-total">— messages</span>
  <span id="stat-oldest"></span>
</div>

<div id="log-container">
  <div class="empty-state" id="empty-state">
    <h2>No messages yet</h2>
    <p>Waiting for MQTT events…</p>
  </div>
</div>

<script>
// ── Colour hash (topic → hue) ──────────────────────────────────────────────
function topicColor(topic) {
  let h = 0;
  for (let i = 0; i < topic.length; i++) h = (h * 31 + topic.charCodeAt(i)) & 0xffffffff;
  return `hsl(${Math.abs(h) % 360},60%,65%)`;
}

// ── State ─────────────────────────────────────────────────────────────────
let liveOn   = true;
let eventSrc = null;
let minId    = null;
let sinceTs  = null;

const container  = document.getElementById("log-container");
const emptyState = document.getElementById("empty-state");
const searchInput = document.getElementById("search-input");

const loadMoreBtn = document.createElement("button");
loadMoreBtn.id = "load-more";
loadMoreBtn.textContent = "Load more";
loadMoreBtn.onclick = () => fetchHistory(true);

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtTs(epoch) {
  return new Date(epoch * 1000).toLocaleString(undefined, {
    month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
}

function getFilter() {
  return searchInput.value.trim();
}

// Check if a message matches the current filter (client-side guard)
function matchesFilter(msg) {
  const f = getFilter().toLowerCase();
  if (!f) return true;
  return msg.topic.toLowerCase().includes(f) || msg.payload.toLowerCase().includes(f);
}

function buildRow(msg) {
  const row = document.createElement("div");
  row.className = "log-row";
  row.dataset.id = msg.id;

  const ts = document.createElement("span");
  ts.className = "log-ts";
  ts.textContent = fmtTs(msg.ts);

  const topic = document.createElement("span");
  topic.className = "log-topic";
  topic.textContent = msg.topic;
  topic.style.color = topicColor(msg.topic);

  const payload = document.createElement("span");
  payload.className = "log-payload";
  payload.textContent = msg.payload;

  row.appendChild(ts);
  row.appendChild(topic);
  if (msg.retain) {
    const badge = document.createElement("span");
    badge.className = "log-badge";
    badge.textContent = "R";
    row.appendChild(badge);
  }
  row.appendChild(payload);
  return row;
}

function showEmpty(visible) {
  emptyState.style.display = visible ? "block" : "none";
}

function showError(msg) {
  const el = document.createElement("div");
  el.className = "error-msg";
  el.textContent = msg;
  container.prepend(el);
  setTimeout(() => el.remove(), 5000);
}

// ── Search / history ───────────────────────────────────────────────────────
async function fetchHistory(appendBottom = false) {
  const q = getFilter();
  const params = new URLSearchParams({ limit: 100 });
  if (q)       params.set("q", q);
  if (sinceTs) params.set("since", sinceTs);
  if (appendBottom && minId) params.set("before_id", minId);

  try {
    const res  = await fetch(`/api/search?${params}`);
    const rows = await res.json();

    if (!appendBottom) {
      [...container.querySelectorAll(".log-row, #load-more, .error-msg")].forEach(el => el.remove());
      minId = null;
    }

    if (rows.length === 0 && !appendBottom) { showEmpty(true); return; }
    showEmpty(false);

    rows.forEach(msg => {
      const row = buildRow(msg);
      if (appendBottom) container.insertBefore(row, loadMoreBtn);
      else              container.appendChild(row);
      if (minId === null || msg.id < minId) minId = msg.id;
    });

    if (rows.length === 100) container.appendChild(loadMoreBtn);
    else                     loadMoreBtn.remove();
  } catch (e) {
    showError("Search error: " + e.message);
  }
}

// ── Live SSE ───────────────────────────────────────────────────────────────
function connectSSE() {
  if (eventSrc) { eventSrc.close(); eventSrc = null; }
  const q = getFilter();
  const params = new URLSearchParams();
  if (q) params.set("q", q);  // server-side pre-filter

  eventSrc = new EventSource(`/api/stream?${params}`);

  eventSrc.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "connected") {
      document.getElementById("live-indicator").classList.add("visible");
      return;
    }
    // Client-side guard: double-check filter + time window
    if (!matchesFilter(msg)) return;
    if (sinceTs && msg.ts < sinceTs) return;

    showEmpty(false);
    const row = buildRow(msg);
    const firstRow = container.querySelector(".log-row");
    if (firstRow) container.insertBefore(row, firstRow);
    else          container.insertBefore(row, container.firstChild);
  };

  eventSrc.onerror = () => {
    document.getElementById("live-indicator").classList.remove("visible");
    setTimeout(() => { if (liveOn) connectSSE(); }, 3000);
  };
}

function disconnectSSE() {
  if (eventSrc) { eventSrc.close(); eventSrc = null; }
  document.getElementById("live-indicator").classList.remove("visible");
}

// ── Stats ──────────────────────────────────────────────────────────────────
async function refreshStats() {
  try {
    const res  = await fetch("/api/stats");
    const data = await res.json();
    document.getElementById("stat-total").textContent =
      `${data.total.toLocaleString()} messages`;
    document.getElementById("stat-oldest").textContent =
      data.oldest ? `oldest: ${fmtTs(data.oldest)}` : "";
  } catch (_) {}
}

// ── Debounce utility ───────────────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ── Apply filter (search + reconnect SSE) ─────────────────────────────────
function applyFilter() {
  const hasFilter = getFilter().length > 0;
  searchInput.classList.toggle("has-filter", hasFilter);
  fetchHistory();
  if (liveOn) connectSSE();
}

const applyFilterDebounced = debounce(applyFilter, 400);

// ── Controls ───────────────────────────────────────────────────────────────

// Search input: debounced on typing, immediate on Enter
searchInput.addEventListener("input", applyFilterDebounced);
searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter") { clearTimeout(); applyFilter(); }
});

// Preset buttons
document.querySelectorAll(".preset-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    const h = parseInt(this.dataset.h);
    sinceTs = h ? (Date.now() / 1000 - h * 3600) : null;
    applyFilter();
  });
});

// Live toggle
document.getElementById("live-toggle").addEventListener("click", function() {
  liveOn = !liveOn;
  if (liveOn) {
    this.textContent = "Live ●";
    this.className = "live-on";
    connectSSE();
  } else {
    this.textContent = "Live ○";
    this.className = "live-off";
    disconnectSSE();
  }
});

// Clear
document.getElementById("clear-btn").addEventListener("click", () => {
  [...container.querySelectorAll(".log-row, #load-more, .error-msg")].forEach(el => el.remove());
  showEmpty(true);
  minId = null;
});

// ── Init ───────────────────────────────────────────────────────────────────
// Apply default filter from server (UI_DEFAULT_FILTER env var)
if (searchInput.value) {
  searchInput.classList.add("has-filter");
}

fetchHistory();
connectSSE();
refreshStats();
setInterval(refreshStats, 30000);
</script>
</body>
</html>
